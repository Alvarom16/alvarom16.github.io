<!--Main-->
   <main>
      <h1 class="h1-contacto">Contactanos</h1>

      <div class="main-contacto">

         <div class="cajas-inputs">
            <label class="title-inputs">Nombre</label>
            <div>
               <input type="text" class="inputs" >
            </div>
         </div>
         <div class="cajas-inputs">
            <label class="title-inputs">Numero de telefono</label>
            <div>
               <input  type="number" class="inputs" >
            </div>
         </div>
         <div class="cajas-inputs">
            <label class="title-inputs">Asunto</label>
            <div class="inputs">
               <select name="seleccion de servicio" class="inputs"  >
                  <option value="">---</option>
                  <option value="">Armado de PC</option>
                  <option value="">Mantenimiento de PC</option>
                  <option value="">Instalacion de Camaras</option>
                  <option value="">Instalacion de Alarma</option>
                  <option value="">Configuracion de Antenas WiFi</option>
               </select>
            </div>
         </div>
         <div class="cajas-inputs">
            <label class="title-inputs">Mensaje</label>
            <div>
               <textarea name="" id="" cols="30" rows="5" class="inputs input-textarea"></textarea>
            </div>
         </div>    
         <div class="button-contacto">
            <button type="button" class="btn btn-primary"><a href="./confirmado.html">Enviar</a></button>
         </div>
      </div>
